<!DOCTYPE html>
<html lang="en" data-theme="dark">
<!--
  index.html — Lord Grimbo Portfolio
  Landing page. Features: Hero, Featured Projects Carousel, Blog Post Table.
  Navbar and Footer are shared across all pages.
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lord Grimbo — Personal portfolio, gallery, projects and blog." />
  <title>Lord Grimbo</title>

  <!-- Bootstrap 5 CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>


  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- JetBrains Mono — Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet"
  />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ============================================================
       NAVBAR
       Sticky top bar. Brand left, nav links right.
       ============================================================ -->
  <nav
    class="navbar navbar-expand-lg fixed-top"
    role="navigation"
    aria-label="Main navigation"
  >
    <div class="container-fluid px-3">

      <!-- Brand — always links to homepage -->
      <a class="navbar-brand" href="index.html" aria-label="Lord Grimbo — Home">
        Lord Grimbo
      </a>

      <!-- Mobile hamburger toggle -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent"
        aria-controls="navbarContent"
        aria-expanded="false"
        aria-label="Toggle navigation menu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Collapsible nav content -->
      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">

          <!-- Gallery link -->
          <li class="nav-item">
            <a
              class="nav-link"
              href="gallery.html"
              data-page="gallery.html"
              aria-label="Go to Gallery"
            >Gallery</a>
          </li>

          <!-- Projects link -->
          <li class="nav-item">
            <a
              class="nav-link"
              href="projects.html"
              data-page="projects.html"
              aria-label="Go to Projects"
            >Projects</a>
          </li>

          <!-- Blog link -->
          <li class="nav-item">
            <a
              class="nav-link"
              href="blog.html"
              data-page="blog.html"
              aria-label="Go to Blog"
            >Blog</a>
          </li>

          <!-- Contact — opens Social Modal -->
          <li class="nav-item ms-lg-2">
            <button
              type="button"
              class="btn-contact"
              data-bs-toggle="modal"
              data-bs-target="#contactModal"
              aria-haspopup="dialog"
              aria-label="Open contact information"
            >Contact</button>
          </li>

          <!-- Dark/Light mode toggle -->
          <li class="nav-item ms-lg-1">
            <button
              id="theme-toggle"
              aria-label="Switch to light mode"
              title="Switch to light mode"
            >
              <!-- Icon is set by main.js on load -->
              <i class="bi bi-sun-fill" aria-hidden="true"></i>
            </button>
          </li>

        </ul>
      </div><!-- /navbar-collapse -->
    </div><!-- /container-fluid -->
  </nav>
  <!-- END NAVBAR -->


  <!-- Button trigger modal -->

  <!-- ============================================================
       SOCIAL CONTACT MODAL
       Opened via the "Contact" navbar button.
       ============================================================ -->
  <div
    class="modal fade"
    id="contactModal"
    tabindex="-1"
    role="dialog"
    aria-labelledby="contactModalLabel"
    aria-modal="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h2 class="modal-title" id="contactModalLabel">Get In Touch</h2>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close contact modal"
          ></button>
        </div>

        <div class="modal-body">

          <!-- Email -->
          <p class="contact-label">Email</p>
          <p class="contact-email" aria-label="Email address" aria-describedby="contactModalLabel">graysonharbison@gmail.com</p>

          <!-- Social icon links -->
          <p class="contact-label">Find Me Online</p>
          <div class="social-icons" role="list" aria-label="Social media links">

            <!-- GitHub -->
            <a
              href="https://github.com/TheGraysonHarbison"
              class="social-icon-link"
              role="listitem"
              aria-label="GitHub profile (placeholder)"
              title="GitHub"
            >
              <i class="bi bi-github" aria-hidden="true"></i>
            </a>

            <!-- LinkedIn -->
            <a
              href="https://www.linkedin.com/in/grayson-harbison-b975b0298/"
              class="social-icon-link"
              role="listitem"
              aria-label="LinkedIn profile (placeholder)"
              title="LinkedIn"
            >
              <i class="bi bi-linkedin" aria-hidden="true"></i>
            </a>

            <!-- Twitter / X -->
            <a
              href="https://x.com/GraysonHarbison"
              class="social-icon-link"
              role="listitem"
              aria-label="Twitter profile (placeholder)"
              title="Twitter / X"
            >
              <i class="bi bi-twitter-x" aria-hidden="true"></i>
            </a>

            <!-- YouTube -->
            <a
              href="https://www.youtube.com/@grimboanimates"
              class="social-icon-link"
              role="listitem"
              aria-label="YouTube channel (placeholder)"
              title="YouTube"
            >
              <i class="bi bi-youtube" aria-hidden="true"></i>
            </a>

          </div><!-- /social-icons -->
        </div><!-- /modal-body -->

        <div class="modal-footer">
          <button
            type="button"
            class="btn-contact"
            data-bs-dismiss="modal"
            aria-label="Close contact modal"
          >Close</button>
        </div>

      </div><!-- /modal-content -->
    </div><!-- /modal-dialog -->
  </div>
  <!-- END CONTACT MODAL -->


  <!-- ============================================================
       PAGE WRAPPER — Side borders + main content column
       ============================================================ -->
  <div id="page-wrapper">

    <!-- Left tileable border (hidden on mobile) -->
    <aside class="side-border" aria-hidden="true" role="presentation"></aside>

    <!-- --------------------------------------------------------
         MAIN CONTENT
         -------------------------------------------------------- -->
    <main id="main-content" role="main">

      <!-- ======================================================
           HERO SECTION
           ====================================================== -->
      <section class="hero-section" aria-labelledby="hero-heading">

        <h1 id="hero-heading">
          <span class="accent">My Name Is</span> Grayson Harbison
        </h1>

        <p class="hero-description">
          <!-- Placeholder bio — replace with real content -->
          Indie Game Developer and Artist with a passion for complex systems and artistry build with logic.
        </p>

      </section>
      <!-- END HERO -->
    </main>
    <!-- END MAIN CONTENT -->

    <!-- Right tileable border (hidden on mobile) -->
    <div class="side-border" aria-hidden="true" role="presentation"></div>

  </div>
  <!-- END PAGE WRAPPER -->


  <!-- ============================================================
       FOOTER
       ASCII cats flanking the back-to-top button.
       ============================================================ -->
  <footer class="footer-bar" role="contentinfo" aria-label="Site footer">
    <div class="footer-inner">

      <!-- Left ASCII cat -->
      <span class="footer-cats" aria-hidden="true" role="presentation">
 /\_/\
( o.o )
 > ^ <
</span>

      <!-- Back to top button -->
      <button
        id="btn-top"
        class="btn-top"
        aria-label="Scroll back to top of page"
        title="Back to top"
      >
        ↑ Back to Top
      </button>

      <!-- Right ASCII cat -->
      <span class="footer-cats" aria-hidden="true" role="presentation">
 /\_/\
( ^.^ )
 > ~ <
</span>

    </div>
  </footer>
  <!-- END FOOTER -->


  <!-- Bootstrap 5 JS Bundle (includes Popper) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmRxlGs0HGE7d4/cTFfUoHTmkBo"
    crossorigin="anonymous"
  ></script>

  <!-- Custom JS -->
  <script src="src/main.js"></script>
  <script src="src/gallery.js"></script>
</body>
</html>
